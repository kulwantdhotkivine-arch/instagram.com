
<!DOCTYPE html>
<html>
<head>
  <title>Instagram Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#fafafa;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px;
      background:white;
      border-bottom:1px solid #ddd;
      position:sticky;
      top:0;
    }

    .logo{
      font-weight:bold;
      font-size:20px;
    }

    .icons{
      font-size:20px;
    }

    .story-section{
      display:flex;
      overflow-x:auto;
      padding:10px;
      background:white;
      border-bottom:1px solid #ddd;
    }

    .story{
      text-align:center;
      margin-right:10px;
    }

    .story img{
      width:60px;
      height:60px;
      border-radius:50%;
      border:2px solid #ff004f;
    }

    .post{
      background:white;
      margin-top:10px;
      border-top:1px solid #ddd;
      border-bottom:1px solid #ddd;
    }

    .post-header{
      display:flex;
      align-items:center;
      padding:10px;
    }

    .post-header img{
      width:35px;
      height:35px;
      border-radius:50%;
      margin-right:10px;
    }

    .post img{
      width:100%;
    }

    .post-actions{
      padding:10px;
      font-size:20px;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:white;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
      border-top:1px solid #ddd;
      font-size:22px;
    }

  </style>
</head>

<body>

  <div class="header">
    <div class="logo">Instagram</div>
    <div class="icons">❤️ ✉️</div>
  </div>

  <div class="story-section">
    <div class="story">
      <img src="https://i.pravatar.cc/100?img=1">
      <div>You</div>
    </div>
    <div class="story">
      <img src="https://i.pravatar.cc/100?img=2">
      <div>Rahul</div>
    </div>
    <div class="story">
      <img src="https://i.pravatar.cc/100?img=3">
      <div>Aman</div>
    </div>
  </div>

  <div class="post">
    <div class="post-header">
      <img src="https://i.pravatar.cc/100?img=4">
      <b>rahul_123</b>
    </div>
    <img src="https://picsum.photos/500/400">
    <div class="post-actions">
      ❤️ 💬 📤
    </div>
  </div>

  <div class="post">
    <div class="post-header">
      <img src="https://i.pravatar.cc/100?img=5">
      <b>aman_official</b>
    </div>
    <img src="https://picsum.photos/500/401">
    <div class="post-actions">
      ❤️ 💬 📤
    </div>
  </div>

  <div class="bottom-nav">
    🏠 🔍 ➕ ❤️ 👤
  </div>

</body>
</html>
